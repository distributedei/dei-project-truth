const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId: CONFIG.clientId,
    authority: "https://login.microsoftonline.com/" + CONFIG.tenantId,
    redirectUri: window.location.origin,
  },
  cache: { cacheLocation: "sessionStorage" }
});

const SCOPES = ["Sites.Selected", "Files.Read.All", "User.Read"];
let accessToken = null;

async function signIn() {
  await msalInstance.initialize();
  const r = await msalInstance.loginPopup({ scopes: SCOPES });
  document.getElementById("userName").textContent = r.account.username;
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
  const tokenResp = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: r.account });
  accessToken = tokenResp.accessToken;
}

function log(msg, cls) {
  const el = document.getElementById("log");
  el.innerHTML += '<div class="' + (cls||'') + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

async function createItem(fields) {
  const res = await fetch("https://graph.microsoft.com/v1.0/sites/" + CONFIG.siteId + "/lists/" + CONFIG.listId + "/items", {
    method: "POST",
    headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
    body: JSON.stringify({ fields: fields })
  });
  if (!res.ok) {
    const e = await res.json();
    throw new Error(e.error?.message || "Error " + res.status);
  }
  return res.json();
}

async function startUpload() {
  document.getElementById("uploadBtn").disabled = true;
  document.getElementById("progressArea").style.display = "block";
  document.getElementById("log").style.display = "block";
  
  let ok = 0, err = 0, skip = 0;
  const total = ITEMS.length;
  const BATCH = 3; // concurrent requests
  
  for (let i = 0; i < total; i += BATCH) {
    const batch = ITEMS.slice(i, i + BATCH);
    const results = await Promise.allSettled(batch.map(item => createItem(item)));
    
    results.forEach((r, j) => {
      const idx = i + j;
      const item = ITEMS[idx];
      if (r.status === "fulfilled") {
        ok++;
        if (ok % 50 === 0 || ok === total) log("✅ " + ok + " items uploaded", "ok");
      } else {
        err++;
        log("❌ #" + (idx+1) + " " + item.Title + ": " + r.reason.message, "err");
      }
    });
    
    document.getElementById("okCount").textContent = ok;
    document.getElementById("errCount").textContent = err;
    document.getElementById("progressText").textContent = (ok + err + skip) + " / " + total;
    document.getElementById("progressFill").style.width = ((ok + err + skip) / total * 100) + "%";
    
    // Small delay to avoid throttling
    if (i + BATCH < total) await new Promise(r => setTimeout(r, 200));
  }
  
  log("\n🏁 Upload complete! " + ok + " success, " + err + " errors", ok === total ? "ok" : "err");
}
