<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEI Project Truth | Distributed Energy Infrastructure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    :root {
      --navy:     #0a1628;
      --navy-mid: #0f2040;
      --navy-lt:  #162d54;
      --slate:    #1e3a5f;
      --steel:    #2d5282;
      --gold:     #c8a84b;
      --gold-lt:  #e8c96b;
      --white:    #f8f9fa;
      --gray:     #8fa3bb;
      --gray-lt:  #b8cce0;
      --border:   rgba(255,255,255,0.08);
      --green:    #2ecc8a;
      --red:      #e05252;
      --amber:    #e8a930;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 0% 0%, rgba(21,56,108,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 100% 100%, rgba(200,168,75,0.06) 0%, transparent 50%);
    }

    /* ── LAYOUT ── */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px; background: rgba(10,22,40,0.95);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
    .topbar {
      background: rgba(10,22,40,0.9);
      border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px);
    }
    .content { padding: 32px; flex: 1; }

    /* ── SIDEBAR ── */
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 20px;
      letter-spacing: 0.5px;
      color: var(--white);
      line-height: 1.1;
    }
    .logo-wordmark span { color: var(--gold); }
    .logo-tagline {
      font-size: 10px; color: var(--gray);
      text-transform: uppercase; letter-spacing: 2px;
      margin-top: 4px;
    }
    .logo-divider {
      height: 2px; background: linear-gradient(90deg, var(--gold), transparent);
      margin-top: 12px; border-radius: 2px;
    }

    .nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
    .nav-section {
      font-size: 10px; font-weight: 700; color: var(--gray);
      text-transform: uppercase; letter-spacing: 2px;
      padding: 16px 10px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--gray-lt); transition: all 0.2s;
      margin: 2px 0; position: relative;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--white); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(200,168,75,0.15), rgba(21,56,108,0.3));
      color: var(--gold-lt);
      border-left: 2px solid var(--gold);
      padding-left: 12px;
    }
    .nav-icon { width: 20px; text-align: center; font-size: 16px; }
    .nav-badge {
      margin-left: auto; background: var(--red);
      color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 12px;
    }
    .nav-badge.warn { background: var(--amber); color: var(--navy); }

    .sidebar-user {
      padding: 16px 20px; border-top: 1px solid var(--border);
      font-size: 12px;
    }
    .user-name { font-weight: 600; color: var(--white); font-size: 13px; }
    .user-org { color: var(--gray); font-size: 11px; margin-top: 2px; }
    .signout-btn {
      margin-top: 10px; width: 100%; background: transparent;
      border: 1px solid var(--border); color: var(--gray);
      padding: 6px; border-radius: 5px; cursor: pointer;
      font-size: 12px; font-family: 'Barlow', sans-serif;
      transition: all 0.2s;

    .signout-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── TOPBAR ── */
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-title {
      font-family: 'Barlow Condensed', sans-serif;

    }
    .topbar-breadcrumb { font-size: 12px; color: var(--gray); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .live-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--green);
    }
    .live-dot::before {
      content: ''; width: 7px; height: 7px;
      background: var(--green); border-radius: 50%;
      animation: pulse-dot 2s infinite;

    /* ── BUTTONS ── */

      padding: 7px 16px; border-radius: 5px; border: 1px solid;
      cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: 'Barlow', sans-serif;

      letter-spacing: 0.3px;

      background: linear-gradient(135deg, #1a4a8a, #0f2d5e);

    .btn-primary:hover { background: linear-gradient(135deg, #2258a0, #1a3d78); border-color: var(--gold); }
    .btn-gold {

    .btn-ghost { background: transparent; border-color: var(--border); color: var(--gray-lt); }

    .btn-danger { background: rgba(224,82,82,0.15); border-color: var(--red); color: var(--red); }

    /* ── KPI CARDS ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .kpi-card {
      background: linear-gradient(135deg, rgba(15,32,64,0.8), rgba(10,22,40,0.9));
      border: 1px solid var(--border); border-radius: 10px; padding: 20px;

    .kpi-card:hover { transform: translateY(-2px); border-color: rgba(200,168,75,0.3); }
    .kpi-card::before {

    .kpi-card.alert::before { background: linear-gradient(90deg, var(--red), transparent); }
    .kpi-card.warn { border-color: rgba(232,169,48,0.4); }
    .kpi-card.warn::before { background: linear-gradient(90deg, var(--amber), transparent); }
    .kpi-card.good::before { background: linear-gradient(90deg, var(--green), transparent); }

    .kpi-sub.red { color: var(--red); }
    .kpi-sub.green { color: var(--green); }
    .kpi-sub.amber { color: var(--amber); }

    /* ── TABLE ── */

      background: linear-gradient(135deg, rgba(15,32,64,0.7), rgba(10,22,40,0.8));
      border: 1px solid var(--border); border-radius: 10px;

    }
    .table-header {
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;

    .table-title {
      font-family: 'Barlow Condensed', sans-serif;

    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-select {

    th {

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;

    .badge-review    { background: rgba(100,60,180,0.3); color: #b89af0; border: 1px solid rgba(150,100,230,0.3); }

    .badge-rejected  { background: rgba(224,82,82,0.15); color: var(--red); border: 1px solid rgba(224,82,82,0.3); }
    .badge-closed    { background: rgba(255,255,255,0.05); color: var(--gray); border: 1px solid var(--border); }
    .badge-returned  { background: rgba(232,169,48,0.15); color: var(--amber); border: 1px solid rgba(232,169,48,0.3); }

    /* ── BIC ── */
    .bic {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px;

    .bic-eng  { background: rgba(21,56,108,0.4); color: #7eb3e8; }
    .bic-con  { background: rgba(46,204,138,0.15); color: var(--green); }
    .bic-pm   { background: rgba(200,168,75,0.15); color: var(--gold-lt); }
    .bic-own  { background: rgba(232,169,48,0.15); color: var(--amber); }
    .bic-ven  { background: rgba(255,255,255,0.06); color: var(--gray); }
    .bic-ahj  { background: rgba(180,100,50,0.2); color: #e8a07a; }

    /* ── AGING ── */
    .aging-ok     { color: var(--green); font-size: 12px; }
    .aging-warn   { color: var(--amber); font-size: 12px; }
    .aging-danger { color: var(--red); font-size: 12px; font-weight: 700; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(5,12,25,0.85);
      z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: linear-gradient(135deg, #0f2040, #0a1628);
      border: 1px solid rgba(200,168,75,0.2);
      border-radius: 12px; padding: 28px;

    .modal-title {

    .form-input, .form-select, .form-textarea {

    .form-input:focus, .form-select:focus, .form-textarea:focus {

    .form-textarea { resize: vertical; min-height: 80px; }

    /* ── SECTION ── */
    .section-head { margin-bottom: 24px; }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 800; color: var(--white);
      letter-spacing: 0.5px; line-height: 1;

    /* ── LOADING / EMPTY ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; flex-direction: column; gap: 16px; color: var(--gray); }
    .spinner {
      width: 32px; height: 32px;

    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

    /* ── BANNERS ── */
    .banner-error   { background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: #f08080; font-size: 13px; }
    .banner-success { background: rgba(46,204,138,0.1); border: 1px solid rgba(46,204,138,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: var(--green); font-size: 13px; }

    /* ── LOGIN ── */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: var(--navy);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(21,56,108,0.5) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(200,168,75,0.08) 0%, transparent 50%);
    }
    .login-card {
      background: linear-gradient(135deg, rgba(15,32,64,0.95), rgba(10,22,40,0.98));
      border: 1px solid rgba(200,168,75,0.2);

      max-width: 420px; width: 100%;

    .login-logo-area { margin-bottom: 28px; }
    .login-wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 800;
      color: var(--white); letter-spacing: 1px;
    }
    .login-wordmark span { color: var(--gold); }
    .login-tagline { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; }
    .login-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 24px 0; }
    .login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }

    .ms-btn:hover { background: #106ebe; }

    .coming-soon {

      border: 1px dashed rgba(200,168,75,0.3); border-radius: 10px;

    .coming-soon-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .coming-soon-sub { color: var(--gray); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    code { background: rgba(200,168,75,0.15); color: var(--gold-lt); padding: 2px 8px; border-radius: 4px; font-size: 13px; }

    /* ── CONNECTED BANNER ── */
    .connected-banner {
      display: flex; align-items: center; gap: 16px;
      background: linear-gradient(135deg, rgba(46,204,138,0.08), rgba(15,32,64,0.5));
      border: 1px solid rgba(46,204,138,0.2); border-radius: 8px;
      padding: 14px 20px; margin-bottom: 24px;

    .connected-icon { font-size: 24px; }
    .connected-text { flex: 1; }
    .connected-label { font-weight: 600; font-size: 14px; }
    .connected-url { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .connected-url a { color: var(--gold); }

    /* ── MONO ── */
    .mono { font-family: 'Barlow Condensed', sans-serif; color: var(--gold-lt); font-size: 13px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--navy); }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const CONFIG = {
  clientId: "613928f8-0497-47ea-bb0f-c1725a1f156a",
  tenantId: "ec357a32-5b85-438d-a765-ae33c8eb13b7",
  siteId:   "8103997e-0688-4832-a5b4-bf18de7f96f5",
  siteUrl:  "https://distributedei.sharepoint.com",
  lists: { rfi: "38fd99d2-dad5-41d8-a898-4f5e425ad340" }
};

const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin,
  },
  cache: { cacheLocation: "sessionStorage" }
});

const SCOPES = ["Sites.Selected", "Files.Read.All", "User.Read"];

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error("Not signed in");
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r.accessToken;
  }
}

async function graph(method, path, body) {
  const token = await getToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    method: method || "GET",
    headers: { Authorization: `Bearer ${token}`, ...(body ? {"Content-Type":"application/json"} : {}) },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `Error ${res.status}`); }
  return res.status === 204 ? null : res.json();
}

const SITE = `/sites/${CONFIG.siteId}`;

// Map between SharePoint internal names and app display names
const SP_TO_APP = { BallinCourt: "BallInCourt", Assignedto: "AssignedTo" };
const APP_TO_SP = { BallInCourt: "BallinCourt", AssignedTo: "Assignedto" };

function fromSP(fields) {
  const out = {};
  for (const [k,v] of Object.entries(fields)) out[SP_TO_APP[k]||k] = v;
  return out;
}
function toSP(fields) {
  const out = {};
  for (const [k,v] of Object.entries(fields)) out[APP_TO_SP[k]||k] = v;
  return out;
}

async function getItems(listId) {
  const d = await graph("GET", `${SITE}/lists/${listId}/items?expand=fields&$top=500`);
  return (d.value||[]).map(i => ({id:i.id,...fromSP(i.fields)}));
}
async function addItem(listId, fields) {
  return graph("POST", `${SITE}/lists/${listId}/items`, {fields: toSP(fields)});
}
async function editItem(listId, id, fields) {
  return graph("PATCH", `${SITE}/lists/${listId}/items/${id}/fields`, toSP(fields));
}

// ── HELPERS ──────────────────────────────────────────────────────────────────

function Badge({status}) {
  const m = {
    "Draft":"badge-draft","Submitted":"badge-submitted","In Review":"badge-review",
    "Returned - Revise":"badge-returned","Approved":"badge-approved",
    "Rejected":"badge-rejected","Closed":"badge-closed"
  };
  return <span className={`badge ${m[status]||"badge-draft"}`}>{status||"—"}</span>;
}

function BIC({val}) {
  const m = {Engineering:"bic-eng",Construction:"bic-con",PM:"bic-pm",Owner:"bic-own",Vendor:"bic-ven",AHJ:"bic-ahj",Utility:"bic-ahj"};
  const ic = {Engineering:"⚙",Construction:"🏗",PM:"📋",Owner:"👤",Vendor:"📦",AHJ:"🏛",Utility:"🏛"};
  return <span className={`bic ${m[val]||"bic-ven"}`}>{ic[val]||"•"} {val||"—"}</span>;
}

function Aging({date}) {
  if (!date) return <span style={{color:"var(--gray)"}}>—</span>;
  const d = Math.floor((new Date()-new Date(date))/86400000);
  if (d<=0) return <span className="aging-ok">● On Track</span>;
  if (d<7)  return <span className="aging-warn">▲ {d}d overdue</span>;
  return <span className="aging-danger">⚠ {d}d overdue</span>;
}

function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

function Engineering() {

  const [success, setSuccess] = useState(null);

  const [statF, setStatF]   = useState("all");
  const [bicF, setBicF]     = useState("all");
  const [modal, setModal]   = useState(null);

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try { setItems(await getItems(CONFIG.lists.rfi)); }
    catch(e) { setError(e.message); }
    finally { setLoading(false); }
  },[]);

  useEffect(()=>{ load(); },[load]);

  const flash = msg => { setSuccess(msg); setTimeout(()=>setSuccess(null),3000); };

  const filtered = items
    .filter(i=>(typeF==="all"||i.ItemType===typeF)&&(statF==="all"||i.Status===statF)&&(bicF==="all"||i.BallInCourt===bicF))

        <div className="kpi-card">
          <div className="kpi-label">Total Items</div>
          <div className="kpi-value">{items.length}</div>
          <div className="kpi-sub">In SharePoint</div>
        </div>
        <div className={`kpi-card ${overdue.length>0?"alert":""}`}>

          <div className="kpi-value">{overdue.length}</div>
          <div className={`kpi-sub ${overdue.length>0?"red":"green"}`}>{overdue.length>0?"Action required":"All on track"}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">RFIs Open</div>
          <div className="kpi-value">{items.filter(i=>i.ItemType==="RFI"&&i.Status!=="Closed").length}</div>
          <div className="kpi-sub">{items.filter(i=>i.ItemType==="RFI").length} total</div>

        <div className="kpi-card">

          <div className="kpi-value">{items.filter(i=>i.ItemType==="Submittal"&&i.Status!=="Closed").length}</div>
          <div className="kpi-sub">{items.filter(i=>i.ItemType==="Submittal").length} total</div>
        </div>

            <select className="filter-select" value={typeF} onChange={e=>setTypeF(e.target.value)}>
              <option value="all">All Types</option>
              <option value="RFI">RFI</option>
              <option value="Submittal">Submittal</option>

            <select className="filter-select" value={statF} onChange={e=>setStatF(e.target.value)}>
              <option value="all">All Statuses</option>
              {["Draft","Submitted","In Review","Returned - Revise","Approved","Rejected","Closed"].map(s=><option key={s}>{s}</option>)}
            </select>
            <select className="filter-select" value={bicF} onChange={e=>setBicF(e.target.value)}>
              <option value="all">All Ball-in-Court</option>
              {["Engineering","Construction","PM","Owner","Vendor","AHJ","Utility"].map(s=><option key={s}>{s}</option>)}

            <button className="btn btn-ghost btn-sm" onClick={load}>↺ Refresh</button>
            <button className="btn btn-gold btn-sm" onClick={()=>setModal("add")}>+ Add Item</button>

                  <td><Aging date={item.DueDate}/></td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setSel(item);setModal("edit");}}>
                      ✏ Update
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {modal==="add" && <AddModal onClose={()=>setModal(null)} onSave={async f=>{await addItem(CONFIG.lists.rfi,f);flash("Added to SharePoint ✓");load();}}/>}
      {modal==="edit" && sel && <EditModal item={sel} onClose={()=>setModal(null)} onSave={async(id,f)=>{await editItem(CONFIG.lists.rfi,id,f);flash("Updated in SharePoint ✓");load();}}/>}
    </div>
  );
}

        <div className="topbar">
          <div className="topbar-left">
            <div className="topbar-title">{titles[view]}</div>
          </div>
          <div className="topbar-right">
            <div className="live-dot">SharePoint Connected</div>
          </div>
        </div>
        <div className="content">
          {view==="overview"    && <Overview user={user}/>}
          {view==="engineering" && <Engineering/>}
          {view==="owner"       && <ComingSoon title="Owner Log"       listName="DEI-BOM-Procurement"/>}
          {view==="permits"     && <ComingSoon title="Permit Matrix"   listName="DEI-Permit-Matrix"/>}
          {view==="closeout"    && <ComingSoon title="Closeout Tracker" listName="DEI-Closeout-Items"/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
